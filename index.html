<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O.K.S Auto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
            display: ['Manrope', 'sans-serif'],
          },
          colors: {
            border: "var(--border)",
            background: "var(--background)",
            surface: "var(--surface)",
            primary: "var(--primary)",
            secondary: "var(--secondary)",
            accent: "#D60000", // Audi Sport Red
          },
          backgroundImage: {
            'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --background: #ffffff;
      --surface: #f4f4f5;
      --primary: #000000;
      --secondary: #52525b;
      --border: rgba(0, 0, 0, 0.1);
    }

    .dark {
      --background: #000000;
      --surface: #09090b;
      --primary: #ffffff;
      --secondary: #a1a1aa;
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      background-color: var(--background);
      color: var(--primary);
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--background);
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .glass-panel {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Utility for text selection color to match accent */
    ::selection {
      background: #D60000;
      color: #ffffff;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^11.13.1",
    "cobe": "https://esm.sh/cobe",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="font-sans antialiased transition-colors duration-500">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
